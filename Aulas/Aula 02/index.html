<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <title>Aula 02 / Aula Imagens</title>
</head>
<body>
    <h1>Desafio das Imagens</h1>
    <h2>Nome da minha cidade é Domingos Martins-ES</h2> 
    <figure>
        <img src="domingos-martins-ES.jpg"width="40%" height="500px" alt="Hotel Imperador Domingos Martins">
        <!-- Width altera a largura e Height a Altura-->
        <figcaption>Hotel Imperador</figcaption>
        <!-- Legenda da Imagem-->
    </figure>
    <h2>Outra foto da minha cidade agora com alteração de tamanho</h2>
    <h6>(Diminua o site)</h6>
    <picture>
        <source media="(max-width:760px)" srcset="domingos-martins-3.jpg" sizes="200px">
        <img src="praca-dr-arthur-gerhardt.jpg" alt="Hotel Imperador">
    </picture>
</body>
</html>
